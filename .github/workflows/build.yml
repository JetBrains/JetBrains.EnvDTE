name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        
      - name: Setup JDK (JBR) 25
        uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-version: 25

      - name: Run PowerShell build script
        shell: pwsh
        run: ./build.ps1